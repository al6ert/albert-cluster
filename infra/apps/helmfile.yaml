# infra/apps/helmfile.yaml
# Helmfile raíz que incluye todas las aplicaciones.
#
# Lo usan deploy-local.sh, bootstrap-prod.sh y validate-manifests (render/
# lint/diff del entorno completo). ArgoCD ya NO lo usa: cada Application
# apunta a infra/apps/<app>/ (ver infra/bootstrap/appset-*.yaml); el
# ApplicationSet descubre las apps por su app.yaml. La CI comprueba que
# toda app esté registrada en AMBOS sitios.

environments:
  minikube:
    kubeContext: minikube
    values:
      - ../envs/minikube/global-values.yaml
  netcup:
    kubeContext: netcup
    values:
      - ../envs/netcup/global-values.yaml

helmfiles:
  # El orden **define** el sync-wave global
  - path: ./cert-manager/helmfile.yaml.gotmpl   # wave 0
  - path: ./sealed-secrets/helmfile.yaml.gotmpl # wave 0 (después de cert-manager)
  - path: ./traefik/helmfile.yaml.gotmpl        # wave 1
  - path: ./argocd/helmfile.yaml.gotmpl         # wave 2
  - path: ./hello/helmfile.yaml.gotmpl          # wave 3
  - path: ./prometheus/helmfile.yaml.gotmpl     # wave 3

