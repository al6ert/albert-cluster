# Los CRDs se instalan por separado en infra/bootstrap/crds/
# (la clave correcta en el chart argo-cd es crds.install, no crds.enabled)
crds:
  install: false

server:
  service:
    type: ClusterIP
  # Cinturón y tirantes con configs.params.server.insecure=true (el server
  # también lo lee del argocd-cmd-params-cm): el Gateway/Traefik termina TLS.
  extraArgs:
    - --insecure

# La UI se expone vía Gateway API (HTTPRoute en extraObjects de
# infra/envs/<entorno>/argocd-values.yaml); el chart no crea Ingress.

dex:
  enabled: false  # Deshabilita Dex (deprecated, no necesario para tu auth básica)
