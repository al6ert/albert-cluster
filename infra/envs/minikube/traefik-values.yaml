# infra/envs/minikube/traefik-values.yaml
# Environment-specific overrides for Minikube (local development)

ingressRoute:
  dashboard:
    matchRule: >
      Host(`traefik.127.0.0.1.nip.io`)
      && (PathPrefix(`/dashboard`) || PathPrefix(`/api`))

extraObjects:
  # Wildcard certificate for local environment
  - apiVersion: cert-manager.io/v1
    kind: Certificate
    metadata:
      name: wildcard-minikube
      namespace: traefik
    spec:
      secretName: wildcard-minikube-tls
      dnsNames:
        - '*.127.0.0.1.nip.io'
      issuerRef:
        name: local-ca-issuer
        kind: ClusterIssuer

# Listener HTTPS del Gateway con el certificado wildcard local
gateway:
  listeners:
    websecure:
      port: 8443
      protocol: HTTPS
      mode: Terminate
      namespacePolicy:
        from: All
      certificateRefs:
        - name: wildcard-minikube-tls

tlsStore:
  default:
    defaultCertificate:
      secretName: "wildcard-minikube-tls"
