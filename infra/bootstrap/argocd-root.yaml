apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-root
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  source:
    repoURL: https://github.com/al6ert/albert-cluster.git
    targetRevision: main
    path: infra/apps
    plugin:
      name: helmfile
      env:
        - name: HELMFILE_ENVIRONMENT
          value: netcup
        - name: TRAEFIK_CHART_VERSION
          value: "40.3.0"
        - name: CERT_MANAGER_CHART_VERSION
          value: "v1.20.2"
        - name: SEALED_SECRETS_CHART_VERSION
          value: "2.18.6"
        - name: HELLO_CHART_VERSION
          value: "0.2.0"
        - name: ARGOCD_CHART_VERSION
          value: "9.5.21"
        - name: PROMETHEUS_CHART_VERSION
          value: "86.2.2"
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
