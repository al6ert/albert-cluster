# infra/envs/minikube/prometheus-values.yaml
# https://github.com/prometheus-community/helm-charts/blob/main/charts/kube-prometheus-stack/values.yaml
#
# Exposición vía Gateway API: route.main (nativo) para prometheus/alertmanager
# y HTTPRoute en extraManifests para grafana. TLS termina en el Gateway.

grafana:
  enabled: true
  # Credenciales en el Secret grafana-admin (SealedSecret); ver
  # scripts/generate-credentials.sh y docs/README "Gestión de secretos".
  admin:
    existingSecret: grafana-admin

prometheus:
  enabled: true
  route:
    main:
      enabled: true
      hostnames:
        - prometheus.127.0.0.1.nip.io
      parentRefs:
        - name: traefik-gateway
          namespace: traefik
          sectionName: websecure
  prometheusSpec:
    # Reducir retención y recursos para dev
    retention: 2d
    resources:
      requests:
        memory: 256Mi
        cpu: 100m
      limits:
        memory: 512Mi
        cpu: 500m

alertmanager:
  enabled: true
  route:
    main:
      enabled: true
      hostnames:
        - alertmanager.127.0.0.1.nip.io
      parentRefs:
        - name: traefik-gateway
          namespace: traefik
          sectionName: websecure

# Webhooks de admission firmados por cert-manager en vez de los Jobs-hook
# create/patch del chart (tienen ttl=60s y hacen fallar syncs largos de ArgoCD)
prometheusOperator:
  admissionWebhooks:
    certManager:
      enabled: true
  resources:
    limits:
      cpu: 200m
      memory: 200Mi
    requests:
      cpu: 100m
      memory: 100Mi

extraManifests:
  # El subchart de grafana no soporta route nativo; HTTPRoute manual
  - apiVersion: gateway.networking.k8s.io/v1
    kind: HTTPRoute
    metadata:
      name: grafana
      namespace: monitoring
    spec:
      parentRefs:
        - name: traefik-gateway
          namespace: traefik
          sectionName: websecure
      hostnames:
        - grafana.127.0.0.1.nip.io
      rules:
        - backendRefs:
            - name: prometheus-grafana
              port: 80
