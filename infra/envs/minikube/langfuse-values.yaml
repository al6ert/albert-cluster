# infra/envs/minikube/langfuse-values.yaml
# langfuse.127.0.0.1.nip.io vía Gateway API (TLS terminado en el Gateway con
# el wildcard de minikube). El puerto 8443 es el del tunnel local (smoke.sh).

langfuse:
  nextauth:
    url: https://langfuse.127.0.0.1.nip.io:8443

extraManifests:
  - apiVersion: gateway.networking.k8s.io/v1
    kind: HTTPRoute
    metadata:
      name: langfuse-web
      namespace: langfuse
    spec:
      parentRefs:
        - name: traefik-gateway
          namespace: traefik
          sectionName: websecure
      hostnames:
        - langfuse.127.0.0.1.nip.io
      rules:
        - backendRefs:
            - name: langfuse-web
              port: 3000
