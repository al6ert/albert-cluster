# Default values for hello chart
replicaCount: 1

image:
  repository: hashicorp/http-echo
  tag: ""
  pullPolicy: IfNotPresent

# Configuración de recursos
resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

service:
  type: ClusterIP
  port: 80
  targetPort: 5678

# Contexto de seguridad del contenedor (http-echo es un binario estático que
# escucha en un puerto no privilegiado, puede correr como usuario arbitrario)
securityContext:
  runAsNonRoot: true
  runAsUser: 65534
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]
  seccompProfile:
    type: RuntimeDefault

# Exposición vía Gateway API (HTTPRoute). El TLS se termina en el listener
# del Gateway, así que aquí solo se declara el hostname.
route:
  enabled: true
  hostname: hello.127.0.0.1.nip.io
  gateway:
    name: traefik-gateway
    namespace: traefik
    sectionName: websecure

# Application specific settings
app:
  message: "¡Hola desde Minikube!"
