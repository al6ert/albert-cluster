---
apiVersion: v1
kind: Namespace
metadata:
  name: langfuse
  labels:
    argocd.argoproj.io/managed-by: argocd
    # PSS: baseline porque el chart no fija securityContext en web/worker y
    # los subcharts Bitnami (clickhouse/minio) usan fsGroup/probes propios.
    # Subir a restricted si warn/audit no chillan (mismo camino que argocd).
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/audit: restricted
  annotations:
    argocd.argoproj.io/sync-wave: "0"
