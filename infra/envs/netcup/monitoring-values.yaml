# infra/envs/netcup/monitoring-values.yaml
#
# ⚠️ La release NO se instala hasta poner MONITORING_ENABLED="true" en
# versions.env. Antes de eso: crear la cuenta de Grafana Cloud (free tier),
# sustituir las dos URL de abajo por las del stack real (Grafana Cloud →
# Stack → Prometheus "Remote Write Endpoint" y Loki "URL"), y generar el
# secret: ./scripts/generate-credentials.sh --component grafana-cloud
# (lee GRAFANA_CLOUD_PROM_USER, GRAFANA_CLOUD_LOKI_USER y
# GRAFANA_CLOUD_TOKEN de .env.local) + commitear el sellado.
# Guía completa: docs/observability.md.

cluster:
  name: netcup

destinations:
  grafana-cloud-metrics:
    type: prometheus
    url: https://REPLACE-ME.grafana.net/api/prom/push
    auth:
      type: basic
      usernameKey: prometheus-username
      passwordKey: access-token
    secret:
      create: false
      name: grafana-cloud-credentials
      namespace: monitoring
  grafana-cloud-logs:
    type: loki
    url: https://REPLACE-ME.grafana.net/loki/api/v1/push
    auth:
      type: basic
      usernameKey: loki-username
      passwordKey: access-token
    secret:
      create: false
      name: grafana-cloud-credentials
      namespace: monitoring
