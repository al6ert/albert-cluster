# infra/envs/netcup/langfuse-values.yaml
# langfuse.albertperez.dev vía Gateway API (TLS del wildcard en el Gateway;
# el DNS wildcard de Cloudflare ya resuelve, verificado 2026-07-06).

langfuse:
  nextauth:
    url: https://langfuse.albertperez.dev

clickhouse:
  persistence:
    size: 20Gi

s3:
  persistence:
    size: 20Gi

extraManifests:
  - apiVersion: gateway.networking.k8s.io/v1
    kind: HTTPRoute
    metadata:
      name: langfuse-web
      namespace: langfuse
    spec:
      parentRefs:
        - name: traefik-gateway
          namespace: traefik
          sectionName: websecure
      hostnames:
        - langfuse.albertperez.dev
      rules:
        - backendRefs:
            - name: langfuse-web
              port: 3000
