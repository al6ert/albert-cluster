# infra/apps/storage/values.yaml
# OpenEBS Dynamic LocalPV (hostpath): provisioner dinámico de PVs sobre el
# disco del nodo (StorageClass openebs-hostpath, datos en /var/openebs/local).
# Cierra el punto del backlog "estrategia de storage antes de la primera app
# con estado" (la primera es langfuse): cluster de un nodo → hostpath dinámico
# es suficiente; no hay replicación posible con un solo nodo.
#
# ⚠️ Los PVs son locales al nodo: el plan de recuperación de sus datos es
# Velero con node-agent (VELERO_ENABLED), no el propio storage.
# La clase por defecto se decide por entorno: en minikube ya existe "standard"
# (dos defaults = comportamiento indefinido), en netcup no había ninguna.

analytics:
  enabled: false

localpv:
  resources:
    requests:
      cpu: 20m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

hostpathClass:
  enabled: true
  name: openebs-hostpath
  # isDefaultClass y reclaimPolicy: por entorno (envs/*/storage-values.yaml)
