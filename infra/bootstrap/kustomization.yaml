apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # Namespaces y CRDs (fase 0)
  - namespaces/
  - crds/
  - rbac/gh-actions.yaml
  # SealedSecrets y Middlewares (fase 1)
  - secrets/
  - middlewares/

# Las Applications raíz de ArgoCD son específicas de cada entorno y se aplican
# por separado (nunca las dos en el mismo cluster):
#   - argocd-root.yaml     -> producción (scripts/bootstrap-prod.sh)
#   - argocd-minikube.yaml -> local/CI   (deploy-local.sh, dev-ci)
