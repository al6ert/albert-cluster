# infra/envs/netcup/prometheus-values.yaml
# https://github.com/prometheus-community/helm-charts/blob/main/charts/kube-prometheus-stack/values.yaml
#
# Exposición vía Gateway API: route.main (nativo) para prometheus/alertmanager
# y HTTPRoute en extraManifests para grafana. TLS termina en el Gateway con el
# certificado wildcard *.albertperez.dev.

grafana:
  enabled: true
  # Credenciales en el Secret grafana-admin (SealedSecret); ver
  # scripts/generate-credentials.sh y docs/README "Gestión de secretos".
  admin:
    existingSecret: grafana-admin
  persistence:
    enabled: true
    size: 10Gi

prometheus:
  enabled: true
  route:
    main:
      enabled: true
      hostnames:
        - prometheus.albertperez.dev
      parentRefs:
        - name: traefik-gateway
          namespace: traefik
          sectionName: websecure
  prometheusSpec:
    retention: 30d
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 50Gi
    resources:
      requests:
        memory: 2Gi
        cpu: 500m
      limits:
        memory: 4Gi
        cpu: 2000m

alertmanager:
  enabled: true
  persistence:
    enabled: true
    size: 10Gi
  route:
    main:
      enabled: true
      hostnames:
        - alertmanager.albertperez.dev
      parentRefs:
        - name: traefik-gateway
          namespace: traefik
          sectionName: websecure

extraManifests:
  # El subchart de grafana no soporta route nativo; HTTPRoute manual
  - apiVersion: gateway.networking.k8s.io/v1
    kind: HTTPRoute
    metadata:
      name: grafana
      namespace: monitoring
    spec:
      parentRefs:
        - name: traefik-gateway
          namespace: traefik
          sectionName: websecure
      hostnames:
        - grafana.albertperez.dev
      rules:
        - backendRefs:
            - name: prometheus-grafana
              port: 80
