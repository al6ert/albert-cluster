# NOTA: no definir extraObjects aquí — vive completo (ConfigMap del plugin +
# HTTPRoute) en infra/apps/argocd/values-helmfile.yaml.gotmpl, porque Helm
# reemplaza las listas enteras al fusionar values.

controller:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# El contenedor del plugin helmfile (extraContainers) se define una sola vez en
# infra/apps/argocd/values-helmfile.yaml.gotmpl; no duplicarlo aquí (las listas
# de Helm se reemplazan enteras, no se fusionan).
repoServer:
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 200m
      memory: 256Mi
