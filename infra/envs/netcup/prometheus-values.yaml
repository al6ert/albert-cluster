# infra/envs/netcup/prometheus-values.yaml
# https://github.com/prometheus-community/helm-charts/blob/main/charts/kube-prometheus-stack/values.yaml
#
# Exposición vía Gateway API: route.main (nativo) para prometheus/alertmanager
# y HTTPRoute en extraManifests para grafana. TLS termina en el Gateway con el
# certificado wildcard *.albertperez.dev.

# Dimensionado para un VPS de un nodo: retención corta y discos contenidos.
# Subir retention/storage cuando haya apps reales que observar.

grafana:
  enabled: true
  # Credenciales en el Secret grafana-admin (SealedSecret); ver
  # scripts/generate-credentials.sh y docs/secrets.md.
  admin:
    existingSecret: grafana-admin
  persistence:
    enabled: true
    size: 5Gi

prometheus:
  enabled: true
  route:
    main:
      enabled: true
      hostnames:
        - prometheus.albertperez.dev
      parentRefs:
        - name: traefik-gateway
          namespace: traefik
          sectionName: websecure
  prometheusSpec:
    retention: 15d
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 20Gi
    resources:
      requests:
        memory: 1Gi
        cpu: 250m
      limits:
        memory: 2Gi
        cpu: 1000m

# FIXME: Alertmanager no tiene receptores configurados (las alertas no llegan
# a ningún sitio). Configurar email/Telegram/Slack en alertmanager.config o
# valorar desactivarlo hasta entonces.
alertmanager:
  enabled: true
  persistence:
    enabled: true
    size: 2Gi
  route:
    main:
      enabled: true
      hostnames:
        - alertmanager.albertperez.dev
      parentRefs:
        - name: traefik-gateway
          namespace: traefik
          sectionName: websecure

extraManifests:
  # El subchart de grafana no soporta route nativo; HTTPRoute manual
  - apiVersion: gateway.networking.k8s.io/v1
    kind: HTTPRoute
    metadata:
      name: grafana
      namespace: monitoring
    spec:
      parentRefs:
        - name: traefik-gateway
          namespace: traefik
          sectionName: websecure
      hostnames:
        - grafana.albertperez.dev
      rules:
        - backendRefs:
            - name: prometheus-grafana
              port: 80
