# infra/apps/hello/values.yaml
# Valores base para la aplicación hello.
# El host y el certificado TLS son específicos de cada entorno y se definen
# en infra/envs/<entorno>/hello-values.yaml.

replicaCount: 1

image:
  repository: hashicorp/http-echo
  tag: ""
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 5678

app:
  message: "¡Hola desde el cluster!"
